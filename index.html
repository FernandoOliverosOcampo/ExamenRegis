<!DOCTYPE html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evaluación de Certificación</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .pregunta {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
    }

    input[type=text] {
      width: 100%;

      box-sizing: border-box;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #temporizador {
      color: red;
      font-size: 22px;
      font-weight: bold;

    }

    #resultado {

    }
  </style>
</head>

<body>
  <div id="loginCedula">

    <h2>Validación de ingreso</h2>

    <p>Ingrese su número de cédula:</p>

    <input type="text" id="cedulaIngreso" placeholder="Número de cédula">

    <br><br>

  <script>

      },
      {

        opciones: ["98", "90", "99"],

      },
      {
        pregunta: "34. ¿Cuál de las siguientes condiciones debe garantizarse al ubicar urnas y cubículos?",
        opciones: ["Que las urnas estén cerca de la entrada principal", "Que el ciudadano identifique fácilmente dónde depositar su voto", "Que las mesas estén agrupadas en un mismo salón"],

      {

        opciones: ["Una", "Dos", "Tres"],

      },
      {
        pregunta: "38. ¿Qué debe hacer el registrador ad hoc respecto a las comisiones municipales de coordinación electoral?",
        opciones: ["Revisar compromisos previos y participar activamente en ellas", "Limitarse a recibir las actas finales", "Delegar su participación en los jurados"],
        correcta: 0
      },
      {
        pregunta: "39. ¿Cuál es una función de las comisiones de coordinación electoral relacionada con el orden público?",
        opciones: ["Designar comandantes de policía", "Recomendar traslados de mesas por motivos de fuerza mayor u orden público", "Autorizar campañas políticas"],
        correcta: 1
      },
      {
        pregunta: "40. ¿Qué debe coordinarse con la autoridad competente para proteger la transmisión de información electoral?",
        opciones: ["La publicidad institucional", "La distribución de formularios E-14", "La seguridad informática del proceso electoral"],
        correcta: 2
      }
    ];

    let preguntasSeleccionadas = [];
    const NUMERO_PREGUNTAS = 20;

    // Función para mezclar array (Fisher-Yates shuffle)
    function mezclarArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    // Función para seleccionar preguntas aleatorias
    function seleccionarPreguntasAleatorias() {
      const preguntasMezcladas = mezclarArray([...todasLasPreguntas]);
      preguntasSeleccionadas = preguntasMezcladas.slice(0, NUMERO_PREGUNTAS);
    }

    // Función para renderizar las preguntas
    function renderizarPreguntas() {
      const container = document.getElementById('preguntasContainer');
      container.innerHTML = '';
      
      preguntasSeleccionadas.forEach((pregunta, index) => {
        const div = document.createElement('div');
        div.className = 'pregunta';
        
        // Reemplazar el número original de la pregunta con el número secuencial (1-20)
        const preguntaConNumero = pregunta.pregunta.replace(/^\d+\.\s*/, `${index + 1}. `);
        
        let opcionesHTML = '';
        pregunta.opciones.forEach((opcion, opcionIndex) => {
          const valor = opcionIndex === pregunta.correcta ? '1' : '0';
          opcionesHTML += `<input type="radio" name="p${index}" value="${valor}"> ${opcion}<br>`;
        });
        
        div.innerHTML = `
          <p>${preguntaConNumero}</p>
          ${opcionesHTML}
        `;
        
        container.appendChild(div);
      });
    }

    async function validarCedula() {
      const cedula =
        document.getElementById(
          "cedulaIngreso"
        ).value.replace(/\D/g, '');
      if (cedula === "") {
        alert(
          "Ingrese una cédula"
        );
        return;
      }
      
      // Verificar si estamos dentro del rango de fechas
      const ahora = new Date();
      if (ahora < fechaInicio) {
        const tiempoInicio = fechaInicio.toLocaleString('es-ES');
        alert(`El examen no está disponible aún. Estará disponible a partir del: ${tiempoInicio}`);
        return;
      }
      if (ahora > fechaFin) {
        alert("El tiempo para presentar el examen ha finalizado.");
        return;
      }
      
      // Verificar si el usuario ya existe en MongoDB
      try {
        const response = await fetch('/.netlify/functions/registrar-usuario', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cedula })
        });
        
        const data = await response.json();
        
        if (response.status === 409) {
          document.body.innerHTML = `
          <h1>Evaluación ya presentada</h1>

          <p>
          La cédula ${cedula}
          ya realizó esta evaluación.
          </p>`;
          return;
        }
        
        if (!response.ok) {
          alert('Error al registrar usuario: ' + (data.error || 'Error desconocido'));
          return;
        }
        
      } catch (error) {
        console.error('Error:', error);
        alert('Error de conexión. Por favor intente nuevamente.');
        return;
      }
      
      document.getElementById(
        "loginCedula"
      ).style.display = "none";
      document.getElementById(
        "contenidoExamen"
      ).style.display = "block";
      document.getElementById(
        "documento"
      ).value = cedula;
      
      // Seleccionar y renderizar preguntas aleatorias
      seleccionarPreguntasAleatorias();
      renderizarPreguntas();
    }
    window.onload = function() {
      document.getElementById(
        "contenidoExamen"
      ).style.display = "none";
      document.getElementById(
        "loginCedula"
      ).style.display = "block";
    }
    // FECHA Y HORA DE INICIO Y CIERRE (se obtienen de MongoDB via Netlify Function)
    let fechaInicio = new Date("2026-06-01T00:00:00"); // Valor por defecto
    let fechaFin = new Date("2026-06-17T19:59:59"); // Valor por defecto
    
    // Obtener fechas del servidor
    async function obtenerFechas() {
      try {
        const response = await fetch('/.netlify/functions/obtener-config');
        const data = await response.json();
        if (data.fechaInicio) {
          fechaInicio = new Date(data.fechaInicio);
        }
        if (data.fechaFin) {
          fechaFin = new Date(data.fechaFin);
        }
      } catch (error) {
        console.error('Error al obtener fechas:', error);
      }
    }
    
    // Llamar a la función al cargar
    obtenerFechas();
    let examenFinalizado = false;
    // TEMPORIZADOR Y VERIFICACIÓN DE FECHAS
    setInterval(() => {
      const ahora = new Date();
      
      // Verificar si estamos antes de la fecha de inicio
      if (ahora < fechaInicio) {
        if (!examenFinalizado) {
          examenFinalizado = true;
          const tiempoInicio = fechaInicio.toLocaleString('es-ES');
          document.body.innerHTML = `
            <h1>Examen no disponible</h1>
            <p>El examen estará disponible a partir del: ${tiempoInicio}</p>
          `;
        }
        return;
      }
      
      // Verificar si estamos después de la fecha de cierre
      const restante = fechaFin - ahora;
      if (restante <= 0) {
        if (!examenFinalizado) {
          examenFinalizado = true;
          document.body.innerHTML =
            "<h1>Tiempo agotado</h1>";
        }
        return;
      }
      
      // Mostrar tiempo restante
      const horas = Math.floor(restante / 1000 / 60 / 60);
      const minutos = Math.floor(restante / 1000 / 60) % 60;
      const segundos = Math.floor(restante / 1000) % 60;
      document.getElementById("temporizador").innerHTML =
        `Tiempo restante: ${horas}h ${minutos}m ${segundos}s`;
    }, 1000);
    // DETECTAR CAMBIO DE PESTAÑA
    document.addEventListener(
      "visibilitychange",
      function() {
        if (document.hidden) {
          examenFinalizado = true;
          document.body.innerHTML = `
        <h1>
        Evaluación anulada
        </h1>

        <p>
        Se detectó salida de la página.
        </p>`;
        }
      });

    function calificar() {
      if (examenFinalizado) return;
      const nombre =
        document.getElementById(
          "nombre"
        ).value.trim();
      const documento =
        document.getElementById(
          "documento"
        ).value.trim();
      if (nombre === "") {
        alert(
          "Ingrese su nombre"
        );
        return;
      }
      let total = 0;
      const preguntas = NUMERO_PREGUNTAS;
      const respuestasUsuario = [];
      
      for (let i = 0; i < preguntas; i++) {
        const respuesta =
          document.querySelector(
            'input[name="p' + i + '"]:checked'
          );
        const valor = respuesta ? parseInt(respuesta.value) : 0;
        total += valor;
        
        // Guardar respuesta del usuario
        respuestasUsuario.push({
          pregunta: i + 1,
          respuesta: valor,
          correcta: valor === 1
        });
      }
      const nota =
        (total / preguntas) * 100;
      
      // Guardar resultado en MongoDB
      guardarResultado(documento, nombre, respuestasUsuario, nota);
      
      let mensaje =
        `<h2>Resultado</h2>

    <p>
    <strong>${nombre}</strong>
    </p>

    <p>
    Cédula:
    ${documento}
    </p>

    <p>
    Nota:
    ${nota.toFixed(0)}/100
    </p>`;
      if (nota >= 80) {
        mensaje +=
          `<h2>
        🎉 FELICITACIONES 🎉
        </h2>

        <p>
        Usted será certificado.
        </p>`;
      } else {
        mensaje +=
          `<p>
        No alcanzó el puntaje mínimo
        para certificación.
        </p>`;
      }
      document.getElementById(
        "resultado"
      ).innerHTML = mensaje;
      document.getElementById(
        "examen"
      ).style.display = "none";
    }
    
    async function guardarResultado(cedula, nombre, respuestas, nota) {
      try {
        await fetch('/.netlify/functions/guardar-resultado', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            cedula,
            nombre,
            respuestas,
            nota,
            fecha: new Date()
          })
        });
      } catch (error) {
        console.error('Error al guardar resultado:', error);
      }
    }
  </script>

</body>

</html>
